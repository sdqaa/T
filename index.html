<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qalbi — تعارف</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090f;
  --surface: #111118;
  --card: #16161f;
  --card2: #1c1c28;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --rose: #e8748a;
  --lav: #a78bca;
  --teal: #4ec9b0;
  --text: #f0ece8;
  --muted: #7a7590;
  --border: rgba(201,168,76,0.13);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 15%, rgba(167,139,202,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 85% 85%, rgba(232,116,138,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
header {
  text-align:center;
  padding: 56px 20px 32px;
  position:relative; z-index:1;
  animation: fadeDown .8s ease both;
}
.logo-row { display:flex; align-items:center; justify-content:center; gap:16px; }
.logo-line { width:70px; height:1px; background:linear-gradient(to left,transparent,var(--gold)); }
.logo-line.r { background:linear-gradient(to right,transparent,var(--gold)); }
.site-title {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size: clamp(2.4rem,5vw,3.6rem);
  background: linear-gradient(130deg, var(--gold-light), var(--rose), var(--lav));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.tagline { color:var(--muted); font-size:.85rem; letter-spacing:.18em; text-transform:uppercase; font-weight:300; margin-top:8px; }
.controls {
  max-width:1140px; margin:0 auto;
  padding: 0 20px 28px;
  display:flex; flex-direction:column; gap:14px;
  position:relative; z-index:1;
  animation: fadeUp .7s .1s ease both;
}
.search-wrap { position:relative; max-width:480px; width:100%; }
.search-input {
  width:100%;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:13px 46px 13px 18px;
  color:var(--text); font-family:'Tajawal',sans-serif; font-size:.95rem;
  outline:none; transition: border-color .3s, box-shadow .3s;
}
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:rgba(201,168,76,.4); box-shadow:0 0 0 3px rgba(201,168,76,.07); }
.search-icon { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.95rem; pointer-events:none; }
.filters-row { display:flex; gap:8px; flex-wrap:wrap; }
.chip {
  padding:7px 16px; border-radius:20px;
  font-family:'Tajawal',sans-serif; font-size:.8rem; font-weight:500;
  cursor:pointer; border:1px solid var(--border);
  background:var(--surface); color:var(--muted);
  transition:all .25s; letter-spacing:.03em;
}
.chip:hover { border-color:rgba(201,168,76,.3); color:var(--gold); }
.chip.active { background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(232,116,138,.1)); border-color:rgba(201,168,76,.4); color:var(--gold); }
.profiles-section { max-width:1140px; margin:0 auto; padding:0 20px 80px; position:relative; z-index:1; }
.section-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; animation: fadeUp .7s .2s ease both; }
.section-header h2 { font-size:1rem; font-weight:500; color:var(--gold); letter-spacing:.08em; white-space:nowrap; }
.section-header .line { flex:1; height:1px; background:var(--border); }
.count-badge { color:var(--muted); font-size:.78rem; white-space:nowrap; }
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap:18px; }
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:22px; overflow:hidden; cursor:pointer;
  transition: transform .35s cubic-bezier(.22,.97,.41,.99), box-shadow .35s, border-color .3s;
  opacity:0; transform:translateY(28px);
  animation: cardIn .5s ease forwards;
}
@keyframes cardIn { to { opacity:1; transform:translateY(0); } }
.card:hover { transform:translateY(-9px) scale(1.01); box-shadow:0 28px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(201,168,76,.28); border-color:rgba(201,168,76,.3); }
.card-img { width:100%; height:220px; position:relative; overflow:hidden; background:var(--card2); }
.card-img img { width:100%; height:100%; object-fit:cover; transition: transform .5s ease, filter .4s; filter:saturate(0.85); }
.card:hover .card-img img { transform:scale(1.06); filter:saturate(1.1); }
.card-img .shimmer { position:absolute; inset:0; background:linear-gradient(110deg,var(--card2) 30%,#1f1f2e 50%,var(--card2) 70%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
@keyframes shimmer { to { background-position:-200% 0; } }
.card-img .gradient-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 45%, var(--card) 100%); }
.badge-online { position:absolute; top:12px; left:12px; background:rgba(9,9,15,.75); border:1px solid rgba(74,222,128,.4); color:#4ade80; font-size:.68rem; font-weight:600; padding:4px 10px; border-radius:20px; backdrop-filter:blur(8px); display:flex; align-items:center; gap:5px; letter-spacing:.04em; }
.dot-pulse { width:6px; height:6px; background:#4ade80; border-radius:50%; animation:dotPulse 2s infinite; }
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.65)} }
.badge-verified { position:absolute; top:12px; right:12px; width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-light)); display:flex; align-items:center; justify-content:center; font-size:.7rem; color:#09090f; font-weight:800; }
.card-body { padding:14px 16px 18px; }
.name-row { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:5px; }
.name { font-size:1.1rem; font-weight:700; }
.age-city { font-size:.78rem; color:var(--muted); }
.location { font-size:.75rem; color:var(--muted); margin-bottom:10px; }
.tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.tag { font-size:.66rem; padding:3px 9px; border-radius:20px; font-weight:600; letter-spacing:.04em; border:1px solid; }
.t-rose { background:rgba(232,116,138,.1); color:#e8748a; border-color:rgba(232,116,138,.25); }
.t-lav  { background:rgba(167,139,202,.1); color:#b39ddb; border-color:rgba(167,139,202,.25); }
.t-gold { background:rgba(201,168,76,.1);  color:var(--gold); border-color:rgba(201,168,76,.25); }
.t-blue { background:rgba(96,165,250,.1);  color:#93c5fd; border-color:rgba(96,165,250,.25); }
.t-teal { background:rgba(78,201,176,.1);  color:#4ec9b0; border-color:rgba(78,201,176,.25); }
.bio { font-size:.8rem; color:var(--muted); line-height:1.65; margin-bottom:13px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-actions { display:flex; gap:9px; }
.btn-like { flex:1; padding:9px; border-radius:12px; background:linear-gradient(135deg,rgba(232,116,138,.12),rgba(201,168,76,.08)); border:1px solid rgba(232,116,138,.28); color:var(--rose); font-family:'Tajawal',sans-serif; font-size:.8rem; font-weight:600; cursor:pointer; transition:all .25s; display:flex; align-items:center; justify-content:center; gap:5px; }
.btn-like:hover { background:linear-gradient(135deg,rgba(232,116,138,.22),rgba(201,168,76,.14)); box-shadow:0 4px 18px rgba(232,116,138,.22); }
.btn-like.liked { background:linear-gradient(135deg,rgba(232,116,138,.3),rgba(201,168,76,.18)); border-color:var(--rose); }
.btn-msg { width:40px; height:40px; border-radius:12px; background:rgba(167,139,202,.1); border:1px solid rgba(167,139,202,.25); color:var(--lav); font-size:1rem; cursor:pointer; transition:all .25s; display:flex; align-items:center; justify-content:center; }
.btn-msg:hover { background:rgba(167,139,202,.2); box-shadow:0 4px 14px rgba(167,139,202,.2); }
.overlay { position:fixed; inset:0; background:rgba(5,5,10,.88); backdrop-filter:blur(14px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .3s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--card); border:1px solid rgba(201,168,76,.2); border-radius:26px; max-width:460px; width:100%; overflow:hidden; transform:translateY(30px) scale(.96); transition:transform .35s cubic-bezier(.22,.97,.41,.99); box-shadow:0 40px 100px rgba(0,0,0,.65); max-height:92vh; overflow-y:auto; }
.overlay.open .modal { transform:translateY(0) scale(1); }
.modal-img-wrap { position:relative; height:280px; overflow:hidden; background:var(--card2); }
.modal-img-wrap img { width:100%; height:100%; object-fit:cover; }
.modal-img-wrap .gradient-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,transparent 35%,var(--card) 100%); }
.modal-body { padding:22px 26px 28px; }
.modal-name-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
.modal-name { font-size:1.55rem; font-weight:800; }
.modal-loc { color:var(--muted); font-size:.88rem; margin-bottom:16px; }
.modal-stats { display:flex; margin-bottom:18px; border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.stat { flex:1; padding:14px 10px; text-align:center; border-left:1px solid var(--border); }
.stat:last-child { border-left:none; }
.stat-val { font-size:1.25rem; font-weight:800; color:var(--gold); }
.stat-lbl { font-size:.68rem; color:var(--muted); margin-top:3px; letter-spacing:.05em; }
.modal-bio { font-size:.88rem; color:var(--muted); line-height:1.75; margin-bottom:18px; }
.modal-tags { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:20px; }
.modal-actions { display:flex; gap:12px; }
.btn-primary { flex:1; padding:13px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--gold),var(--rose)); color:#09090f; font-family:'Tajawal',sans-serif; font-size:.92rem; font-weight:800; cursor:pointer; transition:all .25s; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(201,168,76,.35); }
.btn-close { width:48px; height:48px; border-radius:14px; background:var(--surface); border:1px solid var(--border); color:var(--muted); font-size:1.1rem; cursor:pointer; transition:all .25s; display:flex; align-items:center; justify-content:center; }
.btn-close:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
.hearts-layer { position:fixed; inset:0; pointer-events:none; z-index:300; overflow:hidden; }
.heart { position:absolute; bottom:-40px; font-size:1.3rem; opacity:0; animation:floatHeart 2.8s ease-out forwards; }
@keyframes floatHeart { 0%{opacity:0;transform:translateY(0) scale(.5) rotate(-10deg)} 15%{opacity:1} 100%{opacity:0;transform:translateY(-320px) scale(1.3) rotate(18deg)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-22px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(26px)}  to{opacity:1;transform:translateY(0)} }
@media(max-width:480px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<header>
  <div class="logo-row">
    <div class="logo-line"></div>
    <h1 class="site-title">Qalbi</h1>

  </div>

</div>

<div class="hearts-layer" id="heartsLayer"></div>

  { id:18, name:"وسام العمري",  age:35, city:"صنعاء",         dist:"2100 كم", gender:"men",   seed:72, tags:[["تاريخ","t-lav"],["معمار","t-gold"],["كوفي","t-rose"]],        bio:"مهندس ترميم وعاشق للتاريخ اليمني العريق. يرى في كل حجر قديم قصة تستحق أن تُحكى.",                online:false, verified:false, likes:18, matches:4,  f:["all","mid","senior"] },
  { id:19, name:"جنى حداد",     age:28, city:"دمشق",          dist:"1700 كم", gender:"women", seed:15, tags:[["فن","t-rose"],["موسيقى","t-lav"],["تطوع","t-teal"]],          bio:"فنانة تشكيلية ومتطوعة في التعليم. تؤمن أن الفن أقوى لغة للتواصل بين الشعوب.",                      online:true,  verified:true,  likes:66, matches:17, f:["all","mid","online","verified"] },
  { id:20, name:"فيصل القحطاني",age:33, city:"أبوظبي",        dist:"2050 كم", gender:"men",   seed:55, tags:[["طيران","t-blue"],["سباحة","t-teal"],["طبخ","t-gold"]],        bio:"طيار مدني يطبخ أكلات عالمية جمعها من رحلاته. يؤمن أن كل رحلة تضيف نكهة جديدة للحياة.",           online:true,  verified:true,  likes:74, matches:22, f:["all","mid","online","verified"] },
];

const liked = new Set();
let activeFilter = "all";
let currentProfile = null;

function imgUrl(p) {
  return `https://randomuser.me/api/portraits/${p.gender}/${p.seed}.jpg`;
}

function getFiltered(q="") {
  let list = profiles.filter(p => p.f.includes(activeFilter));
  if (q.trim()) {
    const s = q.trim().toLowerCase();
    list = list.filter(p => p.name.includes(s) || p.city.toLowerCase().includes(s) || p.tags.some(([t])=>t.includes(s)));
  }
  return list;
}

function render(list) {
  const grid = document.getElementById("grid");
  document.getElementById("countBadge").textContent = list.length + " شخص";
  grid.innerHTML = "";
  if (!list.length) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:50px">لا توجد نتائج 🌙</p>';
    return;
  }
  list.forEach((p, i) => {
    const isLiked = liked.has(p.id);
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (i * 0.05) + "s";
    card.innerHTML = `
      <div class="card-img">
        <div class="shimmer"></div>
        <img src="${imgUrl(p)}" alt="${p.name}" loading="lazy" onload="this.previousElementSibling.style.display='none'">
        <div class="gradient-overlay"></div>
        ${p.online ? `<div class="badge-online"><span class="dot-pulse"></span>أونلاين</div>` : ""}
        ${p.verified ? `<div class="badge-verified">✓</div>` : ""}
      </div>
      <div class="card-body">
        <div class="name-row">
          <span class="name">${p.name}</span>
          <span class="age-city">${p.age} · ${p.city}</span>
        </div>
        <div class="location">📍 ${p.dist}</div>
        <div class="tags">${p.tags.map(([t,c])=>`<span class="tag ${c}">${t}</span>`).join("")}</div>
        <p class="bio">${p.bio}</p>
        <div class="card-actions">
          <button class="btn-like ${isLiked?"liked":""}" data-id="${p.id}">${isLiked?"❤️ أُعجبت":"🤍 إعجاب"}</button>
          <button class="btn-msg" data-id="${p.id}">💬</button>
        </div>
      </div>`;
    card.addEventListener("click", e => { if (!e.target.closest(".card-actions")) openModal(p); });
    card.querySelector(".btn-like").addEventListener("click", e => { e.stopPropagation(); toggleLike(p.id, card.querySelector(".btn-like")); });
    card.querySelector(".btn-msg").addEventListener("click", e => { e.stopPropagation(); openModal(p); });
    grid.appendChild(card);
  });
}

function toggleLike(id, btn) {
  if (liked.has(id)) { liked.delete(id); btn.innerHTML="🤍 إعجاب"; btn.classList.remove("liked"); }
  else { liked.add(id); btn.innerHTML="❤️ أُعجبت"; btn.classList.add("liked"); spawnHearts(btn); }
}

function spawnHearts(el) {
  const r = el.getBoundingClientRect();
  const layer = document.getElementById("heartsLayer");
  const emojis = ["❤️","💕","✨","💖","🌸","💝"];
  for (let i=0;i<7;i++) setTimeout(()=>{
    const h=document.createElement("div"); h.className="heart";
    h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    h.style.left=(r.left+Math.random()*r.width)+"px";
    h.style.bottom=(window.innerHeight-r.bottom)+"px";
    h.style.animationDelay=(i*.1)+"s";
    h.style.fontSize=(.7+Math.random()*.9)+"rem";
    layer.appendChild(h); setTimeout(()=>h.remove(),3200);
  }, i*70);
}

function openModal(p) {
  currentProfile = p;
  document.getElementById("mImg").src = imgUrl(p);
  document.getElementById("mName").textContent = p.name + ", " + p.age;
  const vEl = document.getElementById("mVerified");
  vEl.textContent = p.verified ? "✓" : "";
  vEl.style.cssText = p.verified ? "background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#09090f;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;" : "";
  document.getElementById("mLoc").innerHTML = `📍 ${p.city} · ${p.dist}${p.online?` · <span style="color:#4ade80">أونلاين الآن</span>`:""}`;
  document.getElementById("mStats").innerHTML = `
    <div class="stat"><div class="stat-val">${p.likes}</div><div class="stat-lbl">إعجاب</div></div>
    <div class="stat"><div class="stat-val">${p.matches}</div><div class="stat-lbl">تطابق</div></div>
    <div class="stat"><div class="stat-val">${p.dist}</div><div class="stat-lbl">المسافة</div></div>`;
  document.getElementById("mBio").textContent = p.bio;
  document.getElementById("mTags").innerHTML = p.tags.map(([t,c])=>`<span class="tag ${c}">${t}</span>`).join("");
  const lb = document.getElementById("mLikeBtn");
  lb.textContent = liked.has(p.id) ? "❤️ أرسلت إعجاب" : "❤️ أرسل إعجاب";
  lb.style.opacity = "1";
  document.getElementById("overlay").classList.add("open");
  document.getElementById("modal").scrollTop = 0;
}

document.getElementById("mLikeBtn").addEventListener("click", ()=>{
  if (!currentProfile) return;
  liked.add(currentProfile.id);
  const lb = document.getElementById("mLikeBtn");
  lb.textContent = "❤️ تم الإرسال! 🎉"; lb.style.opacity=".7";
  spawnHearts(lb);
  render(getFiltered(document.getElementById("searchInput").value));
  setTimeout(closeModal, 900);
});
document.getElementById("mClose").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e=>{ if(e.target===document.getElementById("overlay")) closeModal(); });
function closeModal(){ document.getElementById("overlay").classList.remove("open"); }

document.querySelectorAll(".chip").forEach(c=>{
  c.addEventListener("click", ()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active"); activeFilter=c.dataset.f;
    render(getFiltered(document.getElementById("searchInput").value));
  });
});
document.getElementById("searchInput").addEventListener("input", e=>render(getFiltered(e.target.value)));
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

render(profiles);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلم النطق الإنجليزي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --accent: #f5c542;
    --accent2: #ff6b35;
    --text: #f0ece4;
    --muted: #888;
    --success: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-weight: 800;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 1rem;
    font-family: 'Space Mono', monospace;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    direction: rtl;
  }

  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
    display: block;
  }

  textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: 1rem;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    direction: ltr;
    text-align: left;
  }

  textarea:focus { border-color: var(--accent); }

  textarea::placeholder { color: #444; }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 1rem;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    margin-top: 1rem;
    transition: transform 0.15s, background 0.15s;
    letter-spacing: 0.03em;
  }

  .btn:hover { background: #ffd060; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    animation: slideUp 0.4s ease;
    display: none;
  }

  .result-card.show { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-section {
    margin-bottom: 1.2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .result-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .section-tag {
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    display: block;
  }

  .original-text {
    font-family: 'Space Mono', monospace;
    font-size: 1.15rem;
    color: #fff;
    direction: ltr;
    text-align: left;
    line-height: 1.6;
  }

  .pronunciation-ar {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    direction: rtl;
    text-align: right;
    line-height: 1.8;
    letter-spacing: 0.02em;
  }

  .meaning-ar {
    font-size: 1.05rem;
    color: var(--text);
    direction: rtl;
    text-align: right;
    line-height: 1.8;
  }

  .tips-section {
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 1rem;
    margin-top: 0.8rem;
  }

  .tips-title {
    font-size: 0.8rem;
    color: var(--accent2);
    font-weight: 700;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    direction: rtl;
  }

  .tip-item {
    font-size: 0.9rem;
    color: #ccc;
    margin-bottom: 0.3rem;
    direction: rtl;
    text-align: right;
    padding-right: 0.5rem;
    border-right: 2px solid var(--accent2);
    margin-right: 0;
    padding-right: 0.8rem;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.95rem;
    direction: rtl;
  }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 0.9s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.8rem;
    direction: rtl;
  }

  .chip {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 0.35rem 0.8rem;
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    color: #aaa;
    transition: all 0.15s;
    direction: ltr;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); background: #1e1a00; }

  .error-msg {
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    color: #ff7070;
    padding: 1rem;
    border-radius: 10px;
    text-align: center;
    font-size: 0.9rem;
    direction: rtl;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">🎓 تعلم النطق</div>
    <h1>نطق <span>الإنجليزي</span><br>بالعربي</h1>
    <p class="subtitle">اكتب أي جملة إنجليزية واتعلم نطقها صح ✨</p>
  </header>

  <div class="input-card">
    <label class="input-label">✍️ اكتب الجملة الإنجليزية هنا</label>
    <textarea id="inputText" placeholder="مثال: How are you today?"></textarea>

    <div class="example-chips">
      <span class="chip" onclick="useExample(this)">How are you?</span>
      <span class="chip" onclick="useExample(this)">What is your name?</span>
      <span class="chip" onclick="useExample(this)">Good morning!</span>
      <span class="chip" onclick="useExample(this)">Thank you very much</span>
      <span class="chip" onclick="useExample(this)">I love you</span>
      <span class="chip" onclick="useExample(this)">Where are you from?</span>
    </div>

    <button class="btn" id="translateBtn" onclick="getPronunciation()">
      🔊 اعرفلي النطق الصح
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div id="resultContent"></div>
  </div>
</div>

<script>
  function useExample(el) {
    document.getElementById('inputText').value = el.textContent;
    document.getElementById('inputText').focus();
  }

  async function getPronunciation() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) {
      alert('اكتب جملة الأول!');
      return;
    }

    const btn = document.getElementById('translateBtn');
    const card = document.getElementById('resultCard');
    const content = document.getElementById('resultContent');

    btn.disabled = true;
    btn.textContent = '⏳ شوية...';
    card.classList.add('show');
    content.innerHTML = `
      <div class="loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span>بجيبلك النطق دلوقتي...</span>
      </div>`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "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",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `أنت مساعد لتعليم نطق اللغة الإنجليزية للعرب.

المطلوب: اكتب النطق الصحيح بالعربي للجملة الإنجليزية دي.

الجملة: "${text}"

رد فقط بـ JSON بالشكل ده بدون أي نص إضافي:
{
  "original": "الجملة الأصلية",
  "pronunciation": "النطق بالعربي كلمة كلمة - مثل: هاو آر يو؟",
  "meaning": "معنى الجملة بالعربي",
  "tips": ["نصيحة نطق 1", "نصيحة نطق 2"]
}

مهم:
- اكتب النطق بالعربي بشكل واضح جداً زي ما بيتكلم المصريين
- كل كلمة انجليزي اكتب نطقها بالعربي
- اكتب المعنى بالعربية العامية المصرية
- اديه نصيحتين مفيدين للنطق`
          }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(JSON.stringify(data.error));
      const rawText = data.content.map(i => i.text || "").join("");
      const clean = rawText.replace(/```json|```/g, "").trim();
      const result = JSON.parse(clean);

      const tipsHtml = result.tips && result.tips.length
        ? `<div class="tips-section">
            <div class="tips-title">💡 نصايح للنطق</div>
            ${result.tips.map(t => `<div class="tip-item">${t}</div>`).join('')}
           </div>`
        : '';

      content.innerHTML = `
        <div class="result-section">
          <span class="section-tag">ORIGINAL ▸ الجملة الأصلية</span>
          <div class="original-text">${result.original}</div>
        </div>
        <div class="result-section">
          <span class="section-tag">PRONUNCIATION ▸ النطق بالعربي</span>
          <div class="pronunciation-ar">${result.pronunciation}</div>
          ${tipsHtml}
        </div>
        <div class="result-section">
          <span class="section-tag">MEANING ▸ المعنى</span>
          <div class="meaning-ar">${result.meaning}</div>
        </div>
      `;
    } catch (err) {
      content.innerHTML = `<div class="error-msg">❌ حصل مشكلة، حاول تاني!</div>`;
    }

    btn.disabled = false;
    btn.textContent = '🔊 اعرفلي النطق الصح';
  }

  // Enter key support
  document.getElementById('inputText').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) getPronunciation();
  });
</script>
</body>
</html>
